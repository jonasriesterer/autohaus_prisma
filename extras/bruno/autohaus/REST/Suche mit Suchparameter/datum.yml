info:
  name: Gruendungsdatum ab 2025-02-08
  type: http
  seq: 21

http:
  method: GET
  url: "{{restUrl}}?gruendungsdatum=2025-02-08"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: gruendungsdatum
      value: 2025-02-08
      type: query
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test('Body: Gruendungsdatum und ID', () => {
          res.getBody()
            .content
            .forEach(autohaus => {
              const { gruendungsdatum, id } = autohaus;
              expect(new Date(gruendungsdatum).getTime()).to.be.at.least(new Date('2025-02-08').getTime());
              expect(id).to.be.above(0);
            });
        });
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: matches
      value: ^application\/json(; charset=utf-8)?$
    - expression: res.body.content
      operator: isArray
    - expression: res.body.content
      operator: isNotEmpty

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
