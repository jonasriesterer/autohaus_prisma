info:
  name: Neuanlegen OAuth 2
  type: folder
  seq: 4

request:
  auth:
    type: oauth2
    flow: resource_owner_password_credentials
    accessTokenUrl: "{{oidcTokenUrl}}"
    credentials:
      clientId: "{{clientId}}"
      clientSecret: "{{clientSecret}}"
      placement: body
    resourceOwner:
      username: "{{username}}"
      password: "{{password}}"
    tokenConfig:
      id: credentials
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: true
      autoRefreshToken: false
  variables:
    - name: username
      value: admin
    - name: password
      value: p
    - name: clientId
      value: javascript-client
    - name: clientSecret
      value: 0GzEhEG6MUnn0WqpgMHpTWH7tvMQzC3m
