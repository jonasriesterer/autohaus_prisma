info:
  name: Neues Autohaus ohne Token
  type: http
  seq: 4

http:
  method: POST
  url: "{{restUrl}}"
  headers:
    - name: ""
      value: ""
      disabled: true
  body:
    type: json
    data: |-
      {
        "name": "Autohaus Hamburg",
        "username": "autohaus_hamburg",
        "email": "kontakt@autohaus-hamburg.de",
        "anzahlFahrzeuge": 8,
        "gruendungsdatum": "2023-06-01",
        "homepage": "https://autohaus-hamburg.de",
        "telefonnummer": "+49 40 7654321",
        "adresse": {
          "plz": "20095",
          "ort": "Hamburg",
          "land": "Deutschland"
        },
        "autos": [
          {
            "kennzeichen": "HH-XY987",
            "marke": "Audi",
            "modell": "A6",
            "baujahr": 2022
          }
        ]
      }

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "401"
    - expression: res.headers['content-type']
      operator: eq
      value: application/problem+json

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
