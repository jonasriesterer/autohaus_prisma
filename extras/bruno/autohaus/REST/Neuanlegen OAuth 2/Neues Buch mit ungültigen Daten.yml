info:
  name: Neues Autohaus mit ungültigen Daten
  type: http
  seq: 3

http:
  method: POST
  url: "{{restUrl}}"
  headers:
    - name: ""
      value: ""
      disabled: true
  body:
    type: json
    data: |-
      {
        "name": "",
        "username": "",
        "email": "invalid-email",
        "anzahlFahrzeuge": -5,
        "gruendungsdatum": "2025-02-30",
        "homepage": "not-a-url",
        "telefonnummer": "",
        "adresse": {
          "plz": "123",
          "ort": "",
          "land": ""
        },
        "autos": [
          {
            "kennzeichen": "",
            "marke": "",
            "modell": "",
            "baujahr": 10000
          }
        ]
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "422"
    - expression: res.headers['content-type']
      operator: eq
      value: application/problem+json
    - expression: res.body
      operator: isJson
    - expression: res.body
      operator: isNotEmpty
    - expression: res.body.statusCode
      operator: eq
      value: "422"
    - expression: res.body.title
      operator: eq
      value: Unprocessable Content

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
